<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>徐佳瑩終極歌單爭霸賽</title>
  <style>
    :root {
      --primary-color: #4a6fa5;
      --accent-color: #ff6b6b;
      --bg-color: #f8f9fa;
      --card-bg: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-color);
      color: #333;
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: var(--primary-color);
      margin-bottom: 5px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 20px;
    }

    /* 遊戲對決區塊 */
    #game-container {
      background: var(--card-bg);
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      padding: 30px;
      width: 90%;
      max-width: 600px;
      text-align: center;
    }

    .progress-bar {
      font-size: 14px;
      font-weight: bold;
      color: var(--primary-color);
      margin-bottom: 15px;
    }

    .vs-container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap: 15px;
      margin-top: 20px;
    }

    .song-btn {
      flex: 1;
      padding: 20px 15px;
      font-size: 18px;
      font-weight: bold;
      border: 2px solid var(--primary-color);
      border-radius: 10px;
      background: white;
      color: var(--primary-color);
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .song-btn:hover {
      background: var(--primary-color);
      color: white;
      transform: translateY(-2px);
    }

    .vs-divider {
      font-weight: italic;
      font-size: 20px;
      color: var(--accent-color);
      font-weight: bold;
    }

    /* 樹狀圖顯示區塊 */
    #tree-container {
      display: none;
      width: 100%;
      max-width: 1200px;
      overflow-x: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-top: 20px;
    }

    .bracket {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      min-width: 1000px;
    }

    .round {
      display: flex;
      flex-direction: column;
      justify-content: space-around;
      flex: 1;
      margin: 0 5px;
    }

    .round-title {
      text-align: center;
      font-weight: bold;
      margin-bottom: 10px;
      color: var(--primary-color);
    }

    .matchup {
      display: flex;
      flex-direction: column;
      margin: 5px 0;
      border-left: 3px solid var(--primary-color);
      padding-left: 5px;
      background: #f1f3f5;
      border-radius: 4px;
    }

    .team {
      padding: 4px 8px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .team.winner {
      font-weight: bold;
      color: var(--accent-color);
      background: #ffe3e3;
    }

    .champion-box {
      text-align: center;
      margin-bottom: 20px;
      padding: 15px;
      background: #fff3bf;
      border: 2px dashed #f59f00;
      border-radius: 10px;
    }

    .restart-btn {
      margin-top: 15px;
      padding: 10px 20px;
      background: var(--primary-color);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>徐佳瑩終極歌單爭霸賽</h1>
  <div class="subtitle">打亂順序 1v1 二選一，選出你心中的第一名！</div>

  <!-- 對決面板 -->
  <div id="game-container">
    <div class="progress-bar" id="progress">準備開始...</div>
    <div class="vs-container">
      <button class="song-btn" id="optionA" onclick="selectSong(0)"></button>
      <div class="vs-divider">VS</div>
      <button class="song-btn" id="optionB" onclick="selectSong(1)"></button>
    </div>
  </div>

  <!-- 結果樹狀圖面板 -->
  <div id="tree-container">
    <div class="champion-box">
      <h2>🏆 你的終極冠軍歌曲：<span id="champion-name" style="color: #e67700;"></span> 🏆</h2>
      <button class="restart-btn" onclick="initGame()">重新玩一次</button>
    </div>
    <div class="bracket" id="bracket-view"></div>
  </div>

  <script>
    // 原始歌單 64 首（完全依照你的表格圖片提取）
    const rawSongs = [
      "言不由衷", "在意這件事", "切歌", "是日救星", "我想到你就再也不怕", 
      "別怕", "圓舞曲", "LOVE", "到此為止", "不怕慶祝", 
      "二日醉", "不安小姐", "病人", "以上皆非", "VIP", 
      "布穀", "樂園", "不難", "大頭仔", "給", 
      "你敢不敢", "現在不跳舞要幹嘛", "潛規則", "殘愛", "翻滾吧！我的寶貝", 
      "準明星", "懼高症", "沒有第三者的分手", "極限", "哼情歌", 
      "樹洞的聲音", "喔伊細", "身騎白馬", "尋人啟事", "明天的事情", 
      "迪斯可", "離開動物園的獅子", "沒鎖門", "高空彈跳", "只要一分鐘", 
      "一樣的月光", "灰色", "雛形", "我沒時間討厭你", "綠洲", 
      "白旗", "小寶貝", "去我家", "人啊", "耳邊風", 
      "瓶頸", "時間大師", "理想人生", "兒歌", "記得帶走", 
      "糖果粉碎者", "心裡學", "調色盤", "拉拉隊", "香水", 
      "辣椒", "明知故犯", "失落沙洲", "出口"
    ];

    let roundsData = []; // 紀錄每一輪的比賽過程
    let currentRoundSongs = [];
    let nextRoundSongs = [];
    let currentPairIndex = 0;
    let roundNames = ["64強賽", "32強賽", "16強賽", "8強賽", "準決賽 (4強)", "決賽 (冠亞軍)"];
    let currentRoundIndex = 0;

    // 洗牌函數
    function shuffle(array) {
      let arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // 初始化遊戲
    function initGame() {
      roundsData = [];
      currentRoundIndex = 0;
      currentPairIndex = 0;
      nextRoundSongs = [];
      
      // 打亂 64 首歌
      currentRoundSongs = shuffle(rawSongs);
      
      document.getElementById("game-container").style.display = "block";
      document.getElementById("tree-container").style.display = "none";
      
      renderMatch();
    }

    // 渲染當前對決
    function renderMatch() {
      const totalPairs = currentRoundSongs.length / 2;
      const progressText = `${roundNames[currentRoundIndex]} (${currentPairIndex + 1} / ${totalPairs})`;
      document.getElementById("progress").innerText = progressText;

      const songA = currentRoundSongs[currentPairIndex * 2];
      const songB = currentRoundSongs[currentPairIndex * 2 + 1];

      document.getElementById("optionA").innerText = songA;
      document.getElementById("optionB").innerText = songB;
    }

    // 玩家點擊選擇
    function selectSong(selectedIndex) {
      const songA = currentRoundSongs[currentPairIndex * 2];
      const songB = currentRoundSongs[currentPairIndex * 2 + 1];
      const winner = selectedIndex === 0 ? songA : songB;
      const loser = selectedIndex === 0 ? songB : songA;

      // 紀錄這組對決
      if (!roundsData[currentRoundIndex]) {
        roundsData[currentRoundIndex] = [];
      }
      roundsData[currentRoundIndex].push({ songA, songB, winner });

      nextRoundSongs.push(winner);
      currentPairIndex++;

      // 檢查當前輪次是否結束
      if (currentPairIndex * 2 >= currentRoundSongs.length) {
        if (nextRoundSongs.length === 1) {
          // 選出冠軍，結束遊戲
          showResults(nextRoundSongs[0]);
        } else {
          // 進入下一輪
          currentRoundSongs = nextRoundSongs;
          nextRoundSongs = [];
          currentPairIndex = 0;
          currentRoundIndex++;
          renderMatch();
        }
      } else {
        renderMatch();
      }
    }

    // 顯示最終結果樹狀圖
    function showResults(champion) {
      document.getElementById("game-container").style.display = "none";
      document.getElementById("tree-container").style.display = "block";
      document.getElementById("champion-name").innerText = champion;

      const bracketView = document.getElementById("bracket-view");
      bracketView.innerHTML = "";

      // 渲染樹狀圖的每一輪
      roundsData.forEach((roundMatches, rIndex) => {
        const roundCol = document.createElement("div");
        roundCol.className = "round";

        const title = document.createElement("div");
        title.className = "round-title";
        title.innerText = roundNames[rIndex];
        roundCol.appendChild(title);

        roundMatches.forEach(m => {
          const matchupDiv = document.createElement("div");
          matchupDiv.className = "matchup";

          const teamA = document.createElement("div");
          teamA.className = "team " + (m.winner === m.songA ? "winner" : "");
          teamA.innerText = m.songA;

          const teamB = document.createElement("div");
          teamB.className = "team " + (m.winner === m.songB ? "winner" : "");
          teamB.innerText = m.songB;

          matchupDiv.appendChild(teamA);
          matchupDiv.appendChild(teamB);
          roundCol.appendChild(matchupDiv);
        });

        bracketView.appendChild(roundCol);
      });
    }

    // 啟動遊戲
    window.onload = initGame;
  </script>
</body>
</html>
